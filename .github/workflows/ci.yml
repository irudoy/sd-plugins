name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches-ignore: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install plugin dependencies
        run: |
          for dir in com.isrudoy.*.sdPlugin; do
            echo "Installing dependencies in $dir"
            (cd "$dir" && npm install --omit=optional)
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
