<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Drive Info - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <style>
        select {
            color: rgb(180, 180, 180);
        }
        input[type="number"] {
            width: 50px;
            text-align: center;
        }
        .color-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .threshold-input {
            width: 40px !important;
            min-width: 40px !important;
        }
        .threshold-suffix {
            color: #888;
            font-size: 9pt;
        }
    </style>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">
        <div class="sdpi-heading">Drive Info Settings</div>

        <!-- Display Mode -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Mode</div>
            <select class="sdpi-item-value" id="displayMode" onchange="saveSettings()">
                <option value="0">Single Drive</option>
                <option value="1">All Drives (Rotate)</option>
            </select>
        </div>

        <!-- Single Drive Settings -->
        <div id="singleDriveSettings">
            <div class="sdpi-item">
                <div class="sdpi-item-label">Drive</div>
                <select class="sdpi-item-value" id="selectedDrive" onchange="saveSettings()">
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="sdpi-item">
                <div class="sdpi-item-label empty"></div>
                <button class="sdpi-item-value" onclick="refreshDisks()" style="cursor: pointer;">Refresh disk list</button>
            </div>
            <div class="sdpi-item" type="range">
                <div class="sdpi-item-label">Update every</div>
                <div class="sdpi-item-value">
                    <span class="clickable" onclick="setUpdateInterval(1)">1</span>
                    <input type="range" id="updateInterval" min="1" max="60" value="5" oninput="updateIntervalLabel(); saveSettings()">
                    <span class="clickable" onclick="setUpdateInterval(60)">60</span>
                </div>
            </div>
            <div class="sdpi-item">
                <div class="sdpi-item-label empty"></div>
                <div class="sdpi-item-value">
                    <span id="updateIntervalLabel">5 sec</span>
                </div>
            </div>
        </div>

        <!-- All Drives Settings -->
        <div id="allDrivesSettings" style="display: none;">
            <div class="sdpi-item" type="range">
                <div class="sdpi-item-label">Rotate every</div>
                <div class="sdpi-item-value">
                    <span class="clickable" onclick="setRotationSpeed(1)">1</span>
                    <input type="range" id="rotationSpeed" min="1" max="120" value="5" oninput="updateRotationLabel(); saveSettings()">
                    <span class="clickable" onclick="setRotationSpeed(120)">120</span>
                </div>
            </div>
            <div class="sdpi-item">
                <div class="sdpi-item-label empty"></div>
                <div class="sdpi-item-value">
                    <span id="rotationLabel">5 sec</span>
                </div>
            </div>
        </div>

        <div class="sdpi-heading">Thresholds</div>

        <!-- Low Threshold -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Low Space</div>
            <div class="sdpi-item-value color-input-group">
                <input type="color" id="lowColor" value="#FFFF00" onchange="saveSettings()">
                <input type="number" class="threshold-input" id="lowThreshold" min="1" max="99" value="20" onchange="saveSettings()">
                <span class="threshold-suffix">%</span>
            </div>
        </div>

        <!-- Critical Threshold -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Critical Space</div>
            <div class="sdpi-item-value color-input-group">
                <input type="color" id="criticalColor" value="#FF0000" onchange="saveSettings()">
                <input type="number" class="threshold-input" id="criticalThreshold" min="1" max="99" value="10" onchange="saveSettings()">
                <span class="threshold-suffix">%</span>
            </div>
        </div>

        <div class="sdpi-heading">Display Options</div>

        <!-- Show Label -->
        <div class="sdpi-item" type="checkbox">
            <div class="sdpi-item-label empty"></div>
            <div class="sdpi-item-value">
                <input type="checkbox" id="showLabel" checked onchange="saveSettings()">
                <label for="showLabel"><span></span>Show drive name</label>
            </div>
        </div>

        <!-- Invert Bar -->
        <div class="sdpi-item" type="checkbox">
            <div class="sdpi-item-label empty"></div>
            <div class="sdpi-item-value">
                <input type="checkbox" id="invertBar" onchange="saveSettings()">
                <label for="invertBar"><span></span>Show free space (invert bar)</label>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
