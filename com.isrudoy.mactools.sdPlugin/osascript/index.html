<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>OSA Script - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <style>
        textarea {
            width: 100%;
            height: 200px;
            resize: vertical;
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">
        <div class="sdpi-heading">Script Language</div>

        <!-- Language Selection -->
        <div type="radio" class="sdpi-item">
            <div class="sdpi-item-label">Language</div>
            <div class="sdpi-item-value">
                <span class="sdpi-item-child">
                    <input id="applescriptLang" type="radio" name="language" value="AppleScript" onchange="saveSettings()" />
                    <label for="applescriptLang" class="sdpi-item-label"><span></span>AppleScript</label>
                </span>
                <span class="sdpi-item-child">
                    <input id="javascriptLang" type="radio" name="language" value="JavaScript" onchange="saveSettings()"/>
                    <label for="javascriptLang" class="sdpi-item-label"><span></span>JavaScript (JXA)</label>
                </span>
            </div>
        </div>

        <div class="sdpi-heading">Script</div>

        <!-- Script Text -->
        <div type="textarea" class="sdpi-item">
            <div class="sdpi-item-label">Script</div>
            <div class="sdpi-item-value textarea">
                <textarea id="scriptText" placeholder="Enter your script here..." oninput="saveSettings()"></textarea>
            </div>
        </div>

        <div class="sdpi-heading">Examples</div>

        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <div class="sdpi-item-value" style="font-size: 9pt; color: #888;">
                <strong>AppleScript:</strong><br>
                <code>display dialog "Hello World"</code><br><br>
                <strong>JavaScript (JXA):</strong><br>
                <code>Application('Finder').activate()</code>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
