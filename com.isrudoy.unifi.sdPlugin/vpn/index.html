<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>VPN Status - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <style>
        select {
            color: rgb(180, 180, 180);
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            box-sizing: border-box;
        }
        input[type="number"] {
            width: 50px;
            text-align: center;
        }
        .status-message {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 4px;
            font-size: 9pt;
        }
        .status-success {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .status-error {
            background-color: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }
        .status-info {
            background-color: rgba(33, 150, 243, 0.2);
            color: #2196F3;
        }
        #statusMessage {
            display: none;
        }
        .test-button {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">
        <div class="sdpi-heading">Unifi Controller</div>

        <!-- Controller URL -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Controller URL</div>
            <input class="sdpi-item-value" type="text" id="controllerUrl" placeholder="https://192.168.1.1" onchange="saveSettings()">
        </div>

        <!-- API Key -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">API Key</div>
            <input class="sdpi-item-value" type="password" id="apiKey" placeholder="Enter API key" onchange="saveSettings()">
        </div>

        <!-- Test Connection Button -->
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <button class="sdpi-item-value test-button" id="testButton" onclick="testConnection()">Test Connection</button>
        </div>

        <!-- Status Message -->
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <div class="sdpi-item-value">
                <div id="statusMessage" class="status-message"></div>
            </div>
        </div>

        <div class="sdpi-heading">VPN Client</div>

        <!-- VPN Client Select -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">VPN</div>
            <select class="sdpi-item-value" id="selectedVpn" onchange="saveSettings()">
                <option value="">-- Select VPN --</option>
            </select>
        </div>

        <!-- Refresh VPN List -->
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <button class="sdpi-item-value" onclick="refreshVpnList()">Refresh VPN list</button>
        </div>

        <div class="sdpi-heading">Options</div>

        <!-- Update Interval -->
        <div class="sdpi-item" type="range">
            <div class="sdpi-item-label">Update every</div>
            <div class="sdpi-item-value">
                <span class="clickable" onclick="setUpdateInterval(1)">1</span>
                <input type="range" id="updateInterval" min="1" max="60" value="10" oninput="updateIntervalLabel(); saveSettings()">
                <span class="clickable" onclick="setUpdateInterval(60)">60</span>
            </div>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <div class="sdpi-item-value">
                <span id="updateIntervalLabel">10 sec</span>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
