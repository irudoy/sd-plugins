<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Antelope Control - Mixer</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <link rel="stylesheet" href="../pi-lib/styles.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <script src="../pi-lib/common.js"></script>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">

        <!-- Connection Status -->
        <div class="sdpi-heading">Connection</div>
        <div id="connectionStatus" class="connection-status">
            <div class="status-message status-info">Checking connection...</div>
        </div>

        <!-- Channel Selection -->
        <div class="sdpi-heading">Channel</div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Mixer</div>
            <select class="sdpi-item-value" id="busId" data-setting="busId" data-type="number" onchange="AntelopePI.saveSettings()">
                <option value="0">Monitor/HP1</option>
                <option value="1">Headphones 2</option>
                <option value="2">Line Out</option>
            </select>
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Channel</div>
            <select class="sdpi-item-value" id="channelId" data-setting="channelId" data-type="number" onchange="AntelopePI.saveSettings()">
            </select>
        </div>

        <!-- Press Action -->
        <div class="sdpi-heading">Press Action</div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">On Press</div>
            <select class="sdpi-item-value" id="pressAction" data-setting="pressAction" onchange="AntelopePI.saveSettings()">
                <option value="mute">Mute</option>
                <option value="solo">Solo</option>
            </select>
        </div>

        <!-- Dial Action (Knob only) -->
        <div class="sdpi-heading">Dial Action (Knob)</div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">On Rotate</div>
            <select class="sdpi-item-value" id="dialAction" data-setting="dialAction" onchange="AntelopePI.saveSettings(); updateVisibility();">
                <option value="fader">Fader</option>
                <option value="none">None</option>
            </select>
        </div>

        <div class="sdpi-item" id="faderStepRow">
            <div class="sdpi-item-label">Step</div>
            <select class="sdpi-item-value" id="faderStep" data-setting="faderStep" data-type="number" onchange="AntelopePI.saveSettings()">
                <option value="1" selected>1 per tick</option>
                <option value="2">2 per tick</option>
                <option value="4">4 per tick</option>
            </select>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
