<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Light - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <link rel="stylesheet" href="../pi-lib/styles.css">
    <script src="../static/common.js"></script>
    <script src="../pi-lib/common.js"></script>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">

        <div id="connectionSettingsContainer"></div>

        <div class="sdpi-heading">Light Selection</div>

        <!-- Room Select -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Room</div>
            <select class="sdpi-item-value" id="roomSelect" onchange="SprutHubPI.filterDevices()">
                <option value="">-- All Rooms --</option>
            </select>
        </div>

        <!-- Light Select (Accessory) -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Device</div>
            <select class="sdpi-item-value" id="lightSelect" onchange="SprutHubPI.selectAccessory()">
                <option value="">-- Select Device --</option>
            </select>
        </div>

        <!-- Service Select (Lightbulb) - shown only if multiple -->
        <div class="sdpi-item" id="serviceSelectRow" style="display: none;">
            <div class="sdpi-item-label">Lightbulb</div>
            <select class="sdpi-item-value" id="serviceSelect" onchange="SprutHubPI.selectService()">
                <option value="">-- Select Lightbulb --</option>
            </select>
        </div>

        <!-- Custom Name -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Name</div>
            <input class="sdpi-item-value" type="text" id="customName" placeholder="Custom display name" onchange="SprutHubPI.saveSettings()">
        </div>

        <!-- Refresh Button -->
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <button class="sdpi-item-value" onclick="SprutHubPI.refreshDevices()">Refresh Devices</button>
        </div>

        <div class="sdpi-heading">Action</div>

        <!-- Action Select -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">On Press</div>
            <select class="sdpi-item-value" id="actionSelect" onchange="SprutHubPI.saveSettings()">
                <option value="toggle">Toggle</option>
                <option value="on">Turn On</option>
                <option value="off">Turn Off</option>
            </select>
        </div>

        <!-- Brightness Step -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Dial Step</div>
            <select class="sdpi-item-value" id="brightnessStep" onchange="SprutHubPI.saveSettings()">
                <option value="5">5%</option>
                <option value="10" selected>10%</option>
                <option value="15">15%</option>
                <option value="20">20%</option>
                <option value="25">25%</option>
            </select>
        </div>
    </div>

    <script src="../static/sd-action.js"></script>
    <script src="index.js"></script>
</body>
</html>
