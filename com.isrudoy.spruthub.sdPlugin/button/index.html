<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Button - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <link rel="stylesheet" href="../pi-lib/styles.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <script src="../pi-lib/common.js"></script>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">

        <div id="connectionSettingsContainer"></div>

        <div class="sdpi-heading">Device Selection</div>

        <!-- Room Select -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Room</div>
            <select class="sdpi-item-value" id="roomSelect" onchange="SprutHubPI.filterDevices()">
                <option value="">-- All Rooms --</option>
            </select>
        </div>

        <!-- Device Select -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Device</div>
            <select class="sdpi-item-value" id="deviceSelect" onchange="SprutHubPI.selectAccessory()">
                <option value="">-- Select Device --</option>
            </select>
        </div>

        <!-- Custom Name -->
        <div class="sdpi-item">
            <div class="sdpi-item-label">Name</div>
            <input class="sdpi-item-value" type="text" id="customName" placeholder="Custom display name" onchange="SprutHubPI.saveSettings()">
        </div>

        <!-- Refresh Button -->
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <button class="sdpi-item-value" onclick="SprutHubPI.refreshDevices()">Refresh Devices</button>
        </div>

        <!-- Button Press Section (for Keypad) -->
        <div id="buttonPressSection">
            <div class="sdpi-heading">Button Press</div>

            <!-- Main Button Select -->
            <div class="sdpi-item">
                <div class="sdpi-item-label">Button</div>
                <select class="sdpi-item-value" id="mainButton" onchange="onDialButtonChange('main')">
                    <option value="">— Disabled —</option>
                </select>
            </div>
            <!-- Main Press Type -->
            <div class="sdpi-item" id="mainPressRow" style="display: none;">
                <div class="sdpi-item-label">Press Type</div>
                <select class="sdpi-item-value" id="mainPress" onchange="SprutHubPI.saveSettings()">
                    <option value="0">Single Press</option>
                    <option value="1">Double Press</option>
                    <option value="2">Long Press</option>
                </select>
            </div>
        </div>

        <!-- Dial Actions Section (for Encoder) -->
        <div id="dialActionsSection">
            <div class="sdpi-heading">Dial Actions</div>

            <!-- Dial Rotate Left - Button -->
            <div class="sdpi-item">
                <div class="sdpi-item-label">Rotate Left</div>
                <select class="sdpi-item-value" id="dialLeftButton" onchange="onDialButtonChange('left')">
                    <option value="">— Disabled —</option>
                </select>
            </div>
            <!-- Dial Rotate Left - Press Type -->
            <div class="sdpi-item" id="dialLeftPressRow" style="display: none;">
                <div class="sdpi-item-label">Press Type</div>
                <select class="sdpi-item-value" id="dialLeftPress" onchange="SprutHubPI.saveSettings()">
                    <option value="0">Single Press</option>
                    <option value="1">Double Press</option>
                    <option value="2">Long Press</option>
                </select>
            </div>

            <!-- Dial Rotate Right - Button -->
            <div class="sdpi-item">
                <div class="sdpi-item-label">Rotate Right</div>
                <select class="sdpi-item-value" id="dialRightButton" onchange="onDialButtonChange('right')">
                    <option value="">— Disabled —</option>
                </select>
            </div>
            <!-- Dial Rotate Right - Press Type -->
            <div class="sdpi-item" id="dialRightPressRow" style="display: none;">
                <div class="sdpi-item-label">Press Type</div>
                <select class="sdpi-item-value" id="dialRightPress" onchange="SprutHubPI.saveSettings()">
                    <option value="0">Single Press</option>
                    <option value="1">Double Press</option>
                    <option value="2">Long Press</option>
                </select>
            </div>

            <!-- Dial Press - Button -->
            <div class="sdpi-item">
                <div class="sdpi-item-label">Knob Press</div>
                <select class="sdpi-item-value" id="dialPressButton" onchange="onDialButtonChange('press')">
                    <option value="">— Disabled —</option>
                </select>
            </div>
            <!-- Dial Press - Press Type -->
            <div class="sdpi-item" id="dialPressPressRow" style="display: none;">
                <div class="sdpi-item-label">Press Type</div>
                <select class="sdpi-item-value" id="dialPressPress" onchange="SprutHubPI.saveSettings()">
                    <option value="0">Single Press</option>
                    <option value="1">Double Press</option>
                    <option value="2">Long Press</option>
                </select>
            </div>

            <!-- Custom Status Text -->
            <div class="sdpi-item">
                <div class="sdpi-item-label">Status Text</div>
                <input class="sdpi-item-value" type="text" id="customStatus" placeholder="e.g., Vol ↑↓" onchange="SprutHubPI.saveSettings()">
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
