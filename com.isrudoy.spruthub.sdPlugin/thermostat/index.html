<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Thermostat - Settings</title>
    <link rel="stylesheet" href="../static/css/sdpi.css">
    <link rel="stylesheet" href="../pi-lib/styles.css">
    <script src="../static/common.js"></script>
    <script src="../static/sd-action.js"></script>
    <script src="../pi-lib/common.js"></script>
</head>
<body>
    <div class="sdpi-wrapper" style="display: none;">
        <div id="connectionSettingsContainer"></div>
        <div class="sdpi-heading">Thermostat Selection</div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Room</div>
            <select class="sdpi-item-value" id="roomSelect" onchange="SprutHubPI.filterDevices()"><option value="">-- All Rooms --</option></select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Device</div>
            <select class="sdpi-item-value" id="deviceSelect" onchange="SprutHubPI.selectAccessory()"><option value="">-- Select Device --</option></select>
        </div>
        <div class="sdpi-item" id="serviceSelectRow" style="display: none;">
            <div class="sdpi-item-label">Thermostat</div>
            <select class="sdpi-item-value" id="serviceSelect" onchange="SprutHubPI.selectService()"><option value="">-- Select Thermostat --</option></select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Name</div>
            <input class="sdpi-item-value" type="text" id="customName" placeholder="Custom display name" onchange="SprutHubPI.saveSettings()">
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label empty"></div>
            <button class="sdpi-item-value" onclick="SprutHubPI.refreshDevices()">Refresh Devices</button>
        </div>
        <div class="sdpi-heading">Action</div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">On Press</div>
            <select class="sdpi-item-value" id="actionSelect" onchange="SprutHubPI.saveSettings()">
                <option value="tempUp">Increase Temperature</option>
                <option value="tempDown">Decrease Temperature</option>
                <option value="toggleMode">Toggle Mode</option>
            </select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Temp Step</div>
            <input class="sdpi-item-value" type="number" id="tempStep" value="0.5" step="0.1" min="0.1" max="5" onchange="SprutHubPI.saveSettings()">
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Dial Debounce</div>
            <input class="sdpi-item-value" type="number" id="dialDebounceMs" min="0" max="500" step="50" placeholder="150" onchange="SprutHubPI.saveSettings()">
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
